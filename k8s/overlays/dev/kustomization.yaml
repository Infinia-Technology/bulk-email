apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: bulk-email

resources:
  - ../../base

# CI automatically updates newTag on every push to dev
images:
  - name: ghcr.io/infinia-technology/bulk-email
    newName: ghcr.io/infinia-technology/bulk-email
    newTag: "dev-9d6f98c"

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: bulk-emailer-web
