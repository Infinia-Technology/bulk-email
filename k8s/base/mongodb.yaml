apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: bulk-email
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: "bulk_emailer"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          #livenessProbe:
            #exec:
              #command:
                #- mongosh
                #- --eval
                #- "db.adminCommand('ping')"
            #initialDelaySeconds: 30
            #periodSeconds: 20
          #readinessProbe:
            #exec:
              #command:
                #- mongosh
                #- --eval
                #- "db.adminCommand('ping')"
            #initialDelaySeconds: 10
            #periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: dev
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None   # headless service for StatefulSet
